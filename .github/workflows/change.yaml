name: Create new strat file

on:
  workflow_dispatch:
  schedule:
    - cron: '*/10 17-23 * * *'
    - cron: '*/10 0-7 * * *'

jobs:
  create-strat:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Run creator script
        run: |
          python creator.py
        
      - name: Commit and push changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add strat.txt
          git commit -m 'Update strat.txt with new coordinates' || exit 0
          git push